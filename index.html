<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apropos Systems</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a2e;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #555;
      max-width: 32rem;
      line-height: 1.6;
    }

    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: #999;
    }
  </style>
</head>
<body>
  <main>
    <h1>Apropos Systems</h1>
    <p class="tagline">Regarding systems.</p>
  </main>
  <footer>&copy; 2026 Apropos Systems</footer>
</body>
</html>
